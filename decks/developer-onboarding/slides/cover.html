<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Developer Onboarding — Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/deck.css">
</head>
<body>
<div class="slide-container" data-screen-label="01 Cover" style="position:relative; width:1920px; height:1080px; overflow:hidden; background:#FFFFFF;">

  <!-- Red side panel -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:0; top:0; width:720px; height:1080px; background:var(--c-red); z-index:1;"></div>

  <!-- Diagonal deep-red accent strip -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:660px; top:0; width:120px; height:1080px; background:var(--c-red-deep); transform:skewX(-8deg); z-index:1;"></div>

  <!-- Top thin red rule on right side -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:840px; top:90px; width:960px; height:4px; background:var(--c-red); z-index:1;"></div>

  <!-- Top section label -->
  <div data-object="true" data-object-type="textbox" class="kicker"
       style="position:absolute; left:840px; top:110px; width:600px; z-index:10;">
    Training Deck · v1.0
  </div>

  <!-- Side panel page indicator -->
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:90px; top:120px; width:540px; z-index:10; font-family:var(--f-mono); font-size:24px; font-weight:600; letter-spacing:6px; color:var(--c-white); text-transform:uppercase; opacity:0.9;">
    01 / 05
  </div>

  <!-- White divider on side panel -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:90px; top:840px; width:140px; height:3px; background:var(--c-white); z-index:5;"></div>

  <!-- Side panel small label -->
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:90px; top:880px; width:540px; z-index:10; font-family:var(--f-mono); font-size:22px; font-weight:500; letter-spacing:3px; color:var(--c-white); text-transform:uppercase; opacity:0.85;">
    Engineering · Onboarding
  </div>

  <!-- Main title -->
  <div data-object="true" data-object-type="textbox" class="title-xl"
       style="position:absolute; left:840px; top:300px; width:1000px; z-index:10;">
    Developer<br>Onboarding
  </div>

  <!-- Subtitle -->
  <div data-object="true" data-object-type="textbox" class="lead"
       style="position:absolute; left:840px; top:620px; width:980px; z-index:10;">
    A practical training guide for new engineers — setup, access, verification, and first-week readiness.
  </div>

  <!-- Meta strip -->
  <div data-object="true" data-object-type="shape" class="card-wash"
       style="position:absolute; left:840px; top:880px; width:960px; height:90px; z-index:1;"></div>

  <div data-object="true" data-object-type="textbox" class="kicker-xs"
       style="position:absolute; left:880px; top:900px; width:280px; z-index:10;">
    Audience<br><span class="body-tag" style="letter-spacing:0; text-transform:none;">New Engineers</span>
  </div>

  <div data-object="true" data-object-type="textbox" class="kicker-xs"
       style="position:absolute; left:1180px; top:900px; width:280px; z-index:10;">
    Format<br><span class="body-tag" style="letter-spacing:0; text-transform:none;">5-Slide Training</span>
  </div>

  <div data-object="true" data-object-type="textbox" class="kicker-xs"
       style="position:absolute; left:1480px; top:900px; width:280px; z-index:10;">
    Version<br><span class="body-tag" style="letter-spacing:0; text-transform:none;">1.0 · Copy</span>
  </div>

  <!-- Footer (cover uses a narrower counter on the right column) -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:840px; top:1020px; width:960px; height:2px; background:var(--c-rule); z-index:1;"></div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:840px; top:1035px; width:960px; z-index:10; font-family:var(--f-mono); font-size:16px; font-weight:500; color:var(--c-mute); letter-spacing:2px;">
    DEVELOPER ONBOARDING &nbsp;·&nbsp; 01 / 05
  </div>

</div>
</body>
</html>
