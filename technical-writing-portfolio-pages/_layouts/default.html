<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="{{ '/' | relative_url }}">Shilpa John</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/samples/redacted-api-quickstart-guide/' | relative_url }}">API Sample</a>
      <a href="{{ '/samples/redacted-developer-onboarding-guide/' | relative_url }}">Onboarding Sample</a>
      <a href="{{ '/samples/password-reset-help-article/' | relative_url }}">Help Article</a>

  </div>
</header>


  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong>Shilpa John</strong><br>
        Technical Writer | Software Documentation | Developer Communication
      </div>
      <div>
        <a href="mailto:shilpajohn.sandbox@gmail.com">Email</a> ·
        <a href="https://www.linkedin.com/" target="_blank" rel="noopener">LinkedIn</a> ·

      </div>
    </div>
  </footer>
</body>
</html>
